<html>
<head>
    <title>Student Information</title>
    <style>
        body {
            background-color: #f0f0f0; /* Customize background color */
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .student-info {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            display: inline-block;
            width: 80%;
            max-width: 600px;
        }
        .student-info h1 {
            font-size: 24px;
            color: #333;
        }
        .student-info p {
            font-size: 18px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="student-info">
        <h1>Student Information</h1>
        <p><strong>Name:</strong> John Doe</p>
        <p><strong>Student ID:</strong> STU001</p>
        <p><strong>Courses:</strong> Computer Science, Math</p>
    </div>
</body>
</html>
